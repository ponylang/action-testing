name: PR

on: pull_request

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-entrypoint-py:
    name: Lint entrypoint.py
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1
      - name: pylint
        run: make pylint

  verify-changelog:
    name: Verify CHANGELOG is valid
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ponylang/changelog-tool:release
    steps:
      - uses: actions/checkout@v4.1.1
      - name: Verify CHANGELOG
        run: changelog-tool verify

  aarch64-linux-musl:
    name: aarch64-linux-musl
    runs-on: ubuntu-24.04-arm
    container:
      image: ghcr.io/ponylang/ponyc-ci-aarch64-unknown-linux-musl-builder:20250505
    steps:
      - name: Download
        run: wget https://dl.cloudsmith.io/public/ponylang/nightlies/raw/versions/20250511/ponyc-arm64-unknown-linux-musl.tar.gz
      - name: Extract
        run: tar -xzf ponyc-arm64-unknown-linux-musl.tar.gz
      - name: Set +x bit
        run: |
          chmod a+x ./nightly-20250511/bin/ponyc
      - name: Run
        run: ./nightly-20250511/bin/ponyc --version
